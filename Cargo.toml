[workspace]
members = ["rusticle", "txv-core", "txv-render", "txv-widgets"]

[package]
name = "kairn"
version = "0.1.0"
edition = "2021"

[dependencies]
txv-core = { path = "txv-core" }
txv-render = { path = "txv-render" }
txv-widgets = { path = "txv-widgets" }
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }

[dev-dependencies]
tempfile = "3.15"
crossterm = "0.28"
