[workspace]
members = ["rusticle", "txv", "txv-widgets"]

[package]
name = "kairn"
version = "0.1.0"
edition = "2021"
description = "A TUI IDE oriented around Kiro AI"

[dependencies]
txv = { path = "txv" }
txv-widgets = { path = "txv-widgets" }
rusticle = { path = "rusticle" }
crossterm = "0.28"
clap = { version = "4.5", features = ["derive"] }
portable-pty = "0.8"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
similar = "2.6"
syntect = { version = "5.2", default-features = false, features = ["default-syntaxes", "default-themes", "regex-onig"] }
nucleo = "0.5"
gix = { version = "0.66", default-features = false, features = ["basic", "blob-diff"] }
regex = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
ignore = "0.4"

[dev-dependencies]
tempfile = "3"
