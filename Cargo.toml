[workspace]
members = [".", "rusticle", "txv", "txv-widgets", "rusticle-tk"]

[package]
name = "kairn"
version = "0.1.0"
edition = "2021"
description = "A TUI IDE oriented around Kiro AI"
license = "MIT"
repository = "https://github.com/rotmistrk/kairn"

[dependencies]
# Workspace crates
rusticle = { path = "rusticle" }
txv = { path = "txv" }
txv-widgets = { path = "txv-widgets" }

# TUI framework
ratatui = "0.29"
crossterm = "0.28"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Syntax highlighting
syntect = "5"

# Diff engine
similar = "2"

# Git operations
gix = { version = "0.68", default-features = false, features = ["basic", "extras"] }

# Fuzzy search
nucleo = "0.5"

# File traversal (respects .gitignore)
ignore = "0.4"

# Serialization (session persistence)
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Regex (session ID parsing)
regex = "1"

# Error handling
anyhow = "1"
thiserror = "2"

# CLI argument parsing
clap = { version = "4", features = ["derive"] }

# CSV parsing
csv = "1"

# Terminal emulation
vte = "0.13"
portable-pty = "0.8"

# Unix FIFO creation
nix = { version = "0.29", features = ["fs"] }
libc = "0.2"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
tempfile = "3"